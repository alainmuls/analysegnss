[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "analysegnss-ebh-ops"
version = "2.0"
description = """
This package is tailored for the EBH-operations. 
It executes the Equivalent Bump Height (EBH) processing flow using the logged SBF files and outputs ASSUR formatted files.
v2.0: 
    - added support for pip installation
    - added ebh gradient calculation
    - better PVT quality handling and EBH quality check 
    - improved user output and logging
    - better file handling, structure and documentation
    - better error handling
    - ... see commits for more details in ebh-ops-dev branch
"""
requires-python = ">=3.8"
dependencies = [
    "annotated-types==0.7.0",
    "argcomplete==3.4.0",
    "contourpy==1.2.1",
    "cycler==0.12.1",
    "fonttools==4.53.0",
    "kiwisolver==1.4.5",
    "matplotlib==3.9.1",
    "numpy==2.0.0",
    "packaging==24.1",
    "pandas==2.2.2",
    "pillow==10.4.0",
    "plotly==5.22.0",
    "polars==0.20.31",
    "pyarrow==16.1.0",
    "pydantic==2.7.4",
    "pydantic_core==2.18.4",
    "pyparsing==3.1.2",
    "python-dateutil==2.9.0.post0",
    "pytz==2024.1",
    "rich==13.9.4",
    "seaborn==0.13.2",
    "setuptools==75.8.0",
    "six==1.16.0",
    "tabulate==0.9.0",
    "tenacity==8.4.2",
    "termcolor==2.4.0",
    "tqdm==4.66.4",
    "typing_extensions==4.12.2",
    "tzdata==2024.1",
    "utm==0.7.0"
]


[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
# launch scripts
launch_ebh_process = "analysegnss.launch.launch_ebh_process:main"
launch_rnx2rtkp = "analysegnss.launch.launch_rnx2rtkp:main"

# PNT
pnt_data_collector_df_constructor = "analysegnss.pnt.pnt_data_collector_df_constructor:main"

# rinex
get_rnx_files = "analysegnss.rinex.get_rnx_files:main"

# NMEA
get_nmea_files = "analysegnss.nmea.get_nmea_files:main"
nmea_reader = "analysegnss.nmea.nmea_reader:main"

# SBF
get_base_xyz_from_sbf = "analysegnss.sbf.get_base_xyz_from_sbf:main"
rtk_pvtgeod = "analysegnss.sbf.rtk_pvtgeod:main"

# rtklib
ppk_rnx2rtkp = "analysegnss.rtkpos.ppk_rnx2rtkp:main"

# ebh
ebh_lines = "analysegnss.scripts.ebh.ebh_lines:main"
get_ebh_timings = "analysegnss.scripts.ebh.get_ebh_timings:main"
gradient_ebhlines = "analysegnss.scripts.ebh.gradient_ebhlines:main"

# Plotting
plot_coords = "analysegnss.plots.plot_coords:main"
